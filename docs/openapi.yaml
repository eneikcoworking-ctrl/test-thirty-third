openapi: 3.0.3
info:
  title: LeadGen Bot - Campaigns & Contacts API
  description: |
    API contract for Campaign CRUD management, CSV contact parsing, field mapping,
    and bulk contact imports. This API includes safeguards such as duplication checks
    and flood-control daily limits validation to ensure message volume optimization
    without triggering Telegram spam protections.
  version: 1.0.0
servers:
  - url: /api
    description: Local or relative base path for LeadGen API

paths:
  /campaigns:
    get:
      summary: List all campaigns
      description: Returns a list of all active outreach campaigns along with basic aggregate statistics.
      operationId: listCampaigns
      responses:
        '200':
          description: A list of campaigns retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CampaignSummary'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create a new campaign
      description: Creates a new outreach campaign with a spintax messaging template.
      operationId: createCampaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignCreateRequest'
      responses:
        '201':
          description: Campaign created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /campaigns/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: The unique identifier of the campaign
        schema:
          type: integer
          format: int64

    get:
      summary: Get campaign details
      description: Retrieves complete details of a single campaign, including performance statistics and contact counts.
      operationId: getCampaign
      responses:
        '200':
          description: Campaign retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Update an existing campaign
      description: Updates the name and/or spintax template of an existing campaign.
      operationId: updateCampaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignUpdateRequest'
      responses:
        '200':
          description: Campaign updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete a campaign
      description: Deletes the campaign and all associated contacts and dispatched messages.
      operationId: deleteCampaign
      responses:
        '204':
          description: Campaign and all associated data deleted successfully.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /campaigns/{id}/contacts/import/preview:
    parameters:
      - name: id
        in: path
        required: true
        description: The campaign ID to preview contact upload for
        schema:
          type: integer
          format: int64
    post:
      summary: Upload and preview CSV contacts
      description: |
        Parses a multipart CSV upload to provide column detection, preview data,
        duplicate checks, and safety/flood control validations without committing any changes.
      operationId: previewContactImport
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The CSV file containing contacts to import.
              required:
                - file
      responses:
        '200':
          description: CSV parsed and validated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportPreviewResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /campaigns/{id}/contacts/import:
    parameters:
      - name: id
        in: path
        required: true
        description: The campaign ID to import contacts into
        schema:
          type: integer
          format: int64
    post:
      summary: Finalize and execute CSV contact import
      description: |
        Processes and commits the contacts from a previously previewed/parsed CSV file
        using the specified field mappings and options.
      operationId: finalizeContactImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportFinalizeRequest'
      responses:
        '200':
          description: Contacts imported and saved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportFinalizeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
          description: Campaign or temporary session file not found.
        '422':
          description: Validation or limit checking failed (e.g. exceeds safe volume parameters).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    CampaignSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12
        name:
          type: string
          example: "Q3 Cold Outreach Campaign"
        spintaxTemplate:
          type: string
          example: "Привет! {Увидел твой профиль|Наткнулась на твой блог}, {хочу предложить|есть классное предложение}..."
        createdAt:
          type: string
          format: date-time
          example: "2026-07-22T12:00:00Z"
        totalContactsCount:
          type: integer
          example: 2450
        pendingContactsCount:
          type: integer
          example: 2412
        dispatchedMessagesCount:
          type: integer
          example: 38
      required:
        - id
        - name
        - spintaxTemplate
        - createdAt
        - totalContactsCount
        - pendingContactsCount
        - dispatchedMessagesCount

    CampaignDetail:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12
        name:
          type: string
          example: "Q3 Cold Outreach Campaign"
        spintaxTemplate:
          type: string
          example: "Привет! {Увидел твой профиль|Наткнулась на твой блог}, {хочу предложить|есть классное предложение}..."
        createdAt:
          type: string
          format: date-time
          example: "2026-07-22T12:00:00Z"
        stats:
          $ref: '#/components/schemas/CampaignStats'
      required:
        - id
        - name
        - spintaxTemplate
        - createdAt
        - stats

    CampaignStats:
      type: object
      properties:
        totalContacts:
          type: integer
          example: 2450
        pendingContacts:
          type: integer
          example: 2412
        invalidContacts:
          type: integer
          example: 38
        deliveredCount:
          type: integer
          example: 30
        failedCount:
          type: integer
          example: 8
      required:
        - totalContacts
        - pendingContacts
        - invalidContacts
        - deliveredCount
        - failedCount

    CampaignCreateRequest:
      type: object
      properties:
        name:
          type: string
          example: "Q3 Cold Outreach Campaign"
          description: User-friendly name of the campaign.
        spintaxTemplate:
          type: string
          example: "Привет! {Увидел твой профиль|Наткнулась на твой блог}, {хочу предложить|есть классное предложение}..."
          description: Randomizable spintax template for outreach messages.
      required:
        - name
        - spintaxTemplate

    CampaignUpdateRequest:
      type: object
      properties:
        name:
          type: string
          example: "Updated Q3 Campaign"
        spintaxTemplate:
          type: string
          example: "Здравствуйте! {Нашел ваш аккаунт|Заметил ваш пост}..."
      required:
        - name
        - spintaxTemplate

    ImportPreviewResponse:
      type: object
      properties:
        tempFileId:
          type: string
          format: uuid
          example: "9e4f5a6b-c7d8-4e10-9111-a12b3c4d5e6f"
          description: Temporary session ID for referencing this uploaded file during final import.
        parsingSummary:
          $ref: '#/components/schemas/ParsingSummary'
        columnHeaders:
          type: array
          items:
            type: string
          example: ["phone_number", "contact_name", "status"]
          description: Columns found in the uploaded CSV file.
        rowPreview:
          type: array
          items:
            type: array
            items:
              type: string
          example:
            - ["+1 555-0102", "John Smith", "Active"]
            - ["+1 555-0103", "Jane Doe", "Pending"]
          description: Preview of the first few parsed rows.
        suggestedMappings:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SystemField'
          example:
            phone_number: "PHONE"
            contact_name: "FULL_NAME"
          description: Suggested mapping from CSV column header to a supported System Field.
        duplicationSummary:
          $ref: '#/components/schemas/DuplicationSummary'
        floodControlCheck:
          $ref: '#/components/schemas/FloodControlCheck'
      required:
        - tempFileId
        - parsingSummary
        - columnHeaders
        - rowPreview
        - suggestedMappings
        - duplicationSummary
        - floodControlCheck

    ParsingSummary:
      type: object
      properties:
        totalRowsProcessed:
          type: integer
          example: 2450
        validRows:
          type: integer
          example: 2412
        errorsCount:
          type: integer
          example: 38
        errorReportDownloadUrl:
          type: string
          format: uri
          example: "/api/reports/download/9e4f5a6b-c7d8-4e10-9111-a12b3c4d5e6f-errors.csv"
          description: URL to download the full parsing and format validation error report.
      required:
        - totalRowsProcessed
        - validRows
        - errorsCount

    DuplicationSummary:
      type: object
      properties:
        duplicateCount:
          type: integer
          example: 12
          description: Number of duplicate contacts already present in the database that will be automatically skipped.
      required:
        - duplicateCount

    FloodControlCheck:
      type: object
      properties:
        safeVolume:
          type: boolean
          example: true
          description: Boolean indicating whether the import is within safe operational volume without risk of throttling.
        dailyMessageCreditsUsed:
          type: integer
          example: 2412
          description: Estimated count of message credits that this import will consume.
        dailyLimitMax:
          type: integer
          example: 12000
          description: Current safe daily message limit / capacity limit.
        warningMessage:
          type: string
          nullable: true
          example: null
          description: Warnings or actions suggested to maximize daily volume safely.
      required:
        - safeVolume
        - dailyMessageCreditsUsed
        - dailyLimitMax

    SystemField:
      type: string
      enum:
        - PHONE
        - USERNAME
        - FULL_NAME
        - EMAIL
        - CUSTOM_VARIABLE_1
        - IGNORE
      example: "PHONE"

    ImportFinalizeRequest:
      type: object
      properties:
        tempFileId:
          type: string
          format: uuid
          example: "9e4f5a6b-c7d8-4e10-9111-a12b3c4d5e6f"
          description: The temporary session ID received in the preview response.
        mappings:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SystemField'
          example:
            phone_number: "PHONE"
            contact_name: "FULL_NAME"
            status: "IGNORE"
          description: Explicit mappings defined by the user for each detected CSV column.
        autoFormatE164:
          type: boolean
          default: true
          example: true
          description: If true, phone numbers are automatically normalized to E.164.
        skipDuplicates:
          type: boolean
          default: true
          example: true
          description: If true, duplicates identified in the duplication check are automatically skipped.
      required:
        - tempFileId
        - mappings

    ImportFinalizeResponse:
      type: object
      properties:
        campaignId:
          type: integer
          format: int64
          example: 12
        importedContactsCount:
          type: integer
          example: 2412
        skippedDuplicatesCount:
          type: integer
          example: 12
        status:
          type: string
          example: "SUCCESS"
      required:
        - campaignId
        - importedContactsCount
        - skippedDuplicatesCount
        - status

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2026-07-22T13:45:00Z"
        status:
          type: integer
          example: 400
        error:
          type: string
          example: "Bad Request"
        message:
          type: string
          example: "Field 'name' cannot be blank."
        path:
          type: string
          example: "/api/campaigns"
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationErrorDetails'
          description: Optional list of field-level errors
      required:
        - timestamp
        - status
        - error
        - message
        - path

    ValidationErrorDetails:
      type: object
      properties:
        field:
          type: string
          example: "name"
        rejectedValue:
          type: string
          nullable: true
          example: ""
        message:
          type: string
          example: "must not be blank"
      required:
        - field
        - message

  responses:
    BadRequest:
      description: The request contains invalid parameters or malformed JSON.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource could not be found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
